{% extends "layout.html" %}
{% block content %}

<h3 class="mb-3">Добавить запись</h3>

<form method="post" action="/insert/{{table}}" style="max-width:500px">

<textarea class="form-control mb-3" name="json_data" rows="4"
placeholder='{"name":"test","value":123}'></textarea>

</form>

{% endblock %}
