{% extends "layout.html" %}
{% block content %}

<h3 class="mb-3">Редактировать запись</h3>

<form method="post" action="/update/{{table}}" style="max-width:500px">

<input type="hidden" name="row_id" value="{{row.id}}">

<label class="form-label">JSON данные</label>
<textarea class="form-control mb-3" name="json_data" rows="4">
{{row}}
</textarea>

<button class="btn btn-primary">Обновить</button>
<a class="btn btn-secondary" href="/tables/{{table}}">Назад</a>

</form>

{% endblock %}
